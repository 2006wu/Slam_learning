name: turtlebot

x-turtlebot-common: &turtlebot-common
  build:
    context: .
    dockerfile: Dockerfile
    args:
      USER_UID: "${USER_UID:-1000}"
      USER_GID: "${USER_GID:-1000}"
  image: turtlebot:jazzy
  working_dir: /home/user/TurtleBot
  environment: &turtlebot-environment
    DISPLAY: ":1"
    ROS_DOMAIN_ID: "77"
    RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
    TURTLEBOT3_MODEL: "${TURTLEBOT3_MODEL:-burger}"
    RCUTILS_COLORIZED_OUTPUT: "1"
    QT_X11_NO_MITSHM: "1"
    LIBGL_ALWAYS_SOFTWARE: "${LIBGL_ALWAYS_SOFTWARE:-1}"
  volumes:
    - ..:/home/user/TurtleBot
    - /dev:/dev
    - x11-socket:/tmp/.X11-unix
  ipc: host
  privileged: true
  init: true
  stop_grace_period: 2s

services:
  turtlebot-develop:
    <<: *turtlebot-common
    container_name: turtlebot-develop
    command: bash
    stdin_open: true
    tty: true
    network_mode: host
    depends_on:
      turtlebot-vnc:
        condition: service_healthy

  turtlebot-vnc:
    <<: *turtlebot-common
    container_name: turtlebot-vnc
    hostname: turtlebot-vnc
    command: /usr/local/bin/start-vnc
    stdin_open: true
    tty: true
    environment:
      <<: *turtlebot-environment
      DISPLAY: ":1"
      VNC_PORT: "7778"
      NOVNC_PORT: "6080"
      SOURCE_WORKSPACE: "0"
      VNC_PASSWORD: "${VNC_PASSWORD:-ros}"
      VNC_RESOLUTION: "${VNC_RESOLUTION:-1600x900}"
    ports:
      - "7778:7778"
      - "6080:6080"
    healthcheck:
      test: ["CMD-SHELL", "test -S /tmp/.X11-unix/X1"]
      interval: 2s
      timeout: 2s
      retries: 15

volumes:
  x11-socket:
